let currentSort = { key: 'total_hours', dir: 'desc' };
let filteredData = [...DATA];

// Populate manager filter
const managers = [...new Set(DATA.map(d => d.manager))].sort();
const mgrSelect = document.getElementById('filter-manager');
managers.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m;
  mgrSelect.appendChild(opt);
});

function updateKPIs(data) {
  const totDecH = data.reduce((s,d) => s + d.dec_hours, 0);
  const totDecU = data.reduce((s,d) => s + d.dec_units, 0);
  const totDecC = data.reduce((s,d) => s + d.dec_cases, 0);
  const totRecH = data.reduce((s,d) => s + d.rec_hours, 0);
  const totRecU = data.reduce((s,d) => s + d.rec_units, 0);
  const totH = totDecH + totRecH;
  
  const kpis = [
    { label: 'Associés', value: data.length, cls: '' },
    { label: 'H. Totales', value: totH.toFixed(1), cls: '' },
    { label: 'H. Decant', value: totDecH.toFixed(1), cls: 'blue' },
    { label: 'UPH Decant', value: totDecH > 0 ? Math.round(totDecU/totDecH) : 0, cls: 'blue' },
    { label: 'CPH Decant', value: totDecH > 0 ? Math.round(totDecC/totDecH) : 0, cls: 'blue' },
    { label: 'UPC Decant', value: totDecC > 0 ? (totDecU/totDecC).toFixed(1) : 0, cls: 'blue' },
    { label: 'H. Receive', value: totRecH.toFixed(1), cls: 'green' },
    { label: 'UPH Receive', value: totRecH > 0 ? Math.round(totRecU/totRecH) : 0, cls: 'green' },
    { label: '% Decant', value: totH > 0 ? (totDecH/totH*100).toFixed(1)+'%' : '0%', cls: 'blue' },
    { label: '% Receive', value: totH > 0 ? (totRecH/totH*100).toFixed(1)+'%' : '0%', cls: 'green' },
  ];
  
  const container = document.getElementById('kpi-container');
  container.innerHTML = kpis.map(k => `<div class="kpi ${k.cls}"><div class="label">${k.label}</div><div class="value">${k.value}</div></div>`).join('');
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const mgr = document.getElementById('filter-manager').value;
  const type = document.getElementById('filter-type').value;
  const proc = document.getElementById('filter-process').value;
  
  filteredData = DATA.filter(d => {
    if (search && !d.name.toLowerCase().includes(search) && !d.id.includes(search) && !d.manager.toLowerCase().includes(search)) return false;
    if (mgr && d.manager !== mgr) return false;
    if (type && d.type !== type) return false;
    if (proc === 'both' && (d.dec_hours === 0 || d.rec_hours === 0)) return false;
    if (proc === 'dec_only' && (d.dec_hours === 0 || d.rec_hours > 0)) return false;
    if (proc === 'rec_only' && (d.rec_hours === 0 || d.dec_hours > 0)) return false;
    return true;
  });
  
  // Sort
  filteredData.sort((a, b) => {
    let va = a[currentSort.key], vb = b[currentSort.key];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (currentSort.dir === 'asc') return va > vb ? 1 : va < vb ? -1 : 0;
    return va < vb ? 1 : va > vb ? -1 : 0;
  });
  
  updateKPIs(filteredData);
  
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = filteredData.map(d => `
    <tr onclick="showHistory('${d.id}')">
      <td class="name" title="${d.name}">${d.name}</td>
      <td>${d.manager}</td>
      <td>${d.type}</td>
      <td class="num">${d.total_hours.toFixed(2)}</td>
      <td class="num">${d.dec_hours > 0 ? d.dec_hours.toFixed(2) : '-'}</td>
      <td class="num">${d.dec_uph || '-'}</td>
      <td class="num">${d.dec_cph || '-'}</td>
      <td class="num">${d.dec_upc || '-'}</td>
      <td class="num">${d.rec_hours > 0 ? d.rec_hours.toFixed(2) : '-'}</td>
      <td class="num">${d.rec_uph || '-'}</td>
      <td class="num">${d.pct_decant > 0 ? d.pct_decant.toFixed(1)+'%' : '-'}</td>
      <td class="num">${d.pct_receive > 0 ? d.pct_receive.toFixed(1)+'%' : '-'}</td>
      <td class="bar-cell"><div class="bar"><div class="dec" style="width:${d.pct_decant}%"></div><div class="rec" style="width:${d.pct_receive}%"></div></div></td>
    </tr>
  `).join('');
  
  // Update sort indicators
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.sort === currentSort.key) {
      th.classList.add(currentSort.dir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    }
  });
}

// Sort handlers
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (currentSort.key === key) {
      currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      currentSort = { key, dir: key === 'name' || key === 'manager' || key === 'type' ? 'asc' : 'desc' };
    }
    render();
  });
});

// Filter handlers
document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-manager').addEventListener('change', render);
document.getElementById('filter-type').addEventListener('change', render);
document.getElementById('filter-process').addEventListener('change', render);

// History modal
function showHistory(empId) {
  const snapshots = HISTORY.snapshots;
  const entry = DATA.find(d => d.id === empId);
  if (!entry) return;
  
  let html = `<h2>${entry.name} <span style="color:#8b949e;font-size:0.7em">(${entry.id})</span></h2>`;
  html += `<p style="color:#8b949e;margin-bottom:12px">Manager: ${entry.manager} | Type: ${entry.type}</p>`;
  html += `<table><thead><tr><th>Heure</th><th>H.Tot</th><th>H.DCT</th><th>UPH.D</th><th>CPH.D</th><th>H.RCV</th><th>UPH.R</th><th>%DCT</th><th>%RCV</th></tr></thead><tbody>`;
  
  snapshots.forEach((snap, i) => {
    const d = snap.data[empId];
    if (!d) {
      html += `<tr><td>${snap.timestamp}</td><td colspan="8" style="color:#8b949e">— absent —</td></tr>`;
      return;
    }
    
    // Trend indicators compared to previous
    let trendUph = '';
    if (i > 0) {
      const prev = snapshots[i-1].data[empId];
      if (prev && prev.dec_uph !== d.dec_uph) {
        trendUph = d.dec_uph > prev.dec_uph ? ' <span class="trend-up">↑</span>' : ' <span class="trend-down">↓</span>';
      }
    }
    
    html += `<tr>
      <td style="font-weight:600">${snap.timestamp}</td>
      <td class="num">${d.total_hours.toFixed(2)}</td>
      <td class="num">${d.dec_hours > 0 ? d.dec_hours.toFixed(2) : '-'}</td>
      <td class="num">${d.dec_uph || '-'}${trendUph}</td>
      <td class="num">${d.dec_cph || '-'}</td>
      <td class="num">${d.rec_hours > 0 ? d.rec_hours.toFixed(2) : '-'}</td>
      <td class="num">${d.rec_uph || '-'}</td>
      <td class="num">${d.pct_decant > 0 ? d.pct_decant.toFixed(1)+'%' : '-'}</td>
      <td class="num">${d.pct_receive > 0 ? d.pct_receive.toFixed(1)+'%' : '-'}</td>
    </tr>`;
  });
  
  html += `</tbody></table>`;
  html += `<p style="margin-top:16px;text-align:center;color:#8b949e;font-size:0.85em">Cliquez en dehors pour fermer</p>`;
  
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('active');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('modal-overlay').classList.remove('active');
  }
});

// Initial render
render();
</script>
</body>
</html>
