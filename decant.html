const managers = [...new Set(DATA.map(d=>d.manager))].sort();
const mgrSelect = document.getElementById('filterManager');
managers.forEach(m => { const o = document.createElement('option'); o.value=m; o.textContent=m; mgrSelect.appendChild(o); });

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const mgr = document.getElementById('filterManager').value;
  const typ = document.getElementById('filterType').value;
  const proc = document.getElementById('filterProcess').value;
  const sort = document.getElementById('sortBy').value;
  
  let filtered = DATA.filter(d => {
    if (q && !(d.name.toLowerCase().includes(q) || d.id.includes(q) || d.manager.toLowerCase().includes(q))) return false;
    if (mgr && d.manager !== mgr) return false;
    if (typ && d.type !== typ) return false;
    if (proc === 'both' && (d.dec_hours === 0 || d.rec_hours === 0)) return false;
    if (proc === 'dec_only' && d.rec_hours > 0) return false;
    if (proc === 'rec_only' && d.dec_hours > 0) return false;
    return true;
  });
  
  const [field, dir] = sort.split(/_(?=[^_]+$)/);
  filtered.sort((a,b) => {
    let va = a[field], vb = b[field];
    if (field === 'name') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (dir === 'asc') return va < vb ? -1 : va > vb ? 1 : 0;
    return va > vb ? -1 : va < vb ? 1 : 0;
  });
  
  return filtered;
}

function updateKPIs(filtered) {
  const totH = filtered.reduce((s,d)=>s+d.total_hours,0);
  const decH = filtered.reduce((s,d)=>s+d.dec_hours,0);
  const recH = filtered.reduce((s,d)=>s+d.rec_hours,0);
  const decU = filtered.reduce((s,d)=>s+d.dec_units,0);
  const decC = filtered.reduce((s,d)=>s+d.dec_cases,0);
  const recU = filtered.reduce((s,d)=>s+d.rec_units,0);
  const gDecUph = decH > 0 ? Math.round(decU/decH) : 0;
  const gDecCph = decH > 0 ? Math.round(decC/decH) : 0;
  const gRecUph = recH > 0 ? Math.round(recU/recH) : 0;
  const pDec = totH > 0 ? (decH/totH*100).toFixed(1) : 0;
  const pRec = totH > 0 ? (recH/totH*100).toFixed(1) : 0;
  
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-value">${filtered.length}</div><div class="kpi-label">Associés</div></div>
    <div class="kpi"><div class="kpi-value">${totH.toFixed(1)}h</div><div class="kpi-label">Heures totales</div></div>
    <div class="kpi kpi-dec"><div class="kpi-value">${decH.toFixed(1)}h</div><div class="kpi-label">H. Decant (${pDec}%)</div></div>
    <div class="kpi kpi-dec"><div class="kpi-value">${gDecUph}</div><div class="kpi-label">UPH Decant</div></div>
    <div class="kpi kpi-dec"><div class="kpi-value">${gDecCph}</div><div class="kpi-label">CPH Decant</div></div>
    <div class="kpi kpi-rec"><div class="kpi-value">${recH.toFixed(1)}h</div><div class="kpi-label">H. Receive (${pRec}%)</div></div>
    <div class="kpi kpi-rec"><div class="kpi-value">${gRecUph}</div><div class="kpi-label">UPH Receive</div></div>
  `;
}

function render() {
  const filtered = getFiltered();
  updateKPIs(filtered);
  
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map((d,i) => `
    <tr class="clickable-row" data-id="${d.id}">
      <td>${i+1}</td>
      <td><strong>${d.name}</strong><br><span style="color:#8b949e;font-size:0.68rem">${d.id}</span></td>
      <td>${d.manager}</td>
      <td><span class="type-badge type-${d.type}">${d.type}</span></td>
      <td class="num"><strong>${d.total_hours.toFixed(2)}</strong></td>
      <td class="num" style="color:#58a6ff">${d.dec_hours.toFixed(2)}</td>
      <td class="num">${d.dec_uph}</td>
      <td class="num">${d.dec_cph}</td>
      <td class="num">${d.dec_upc || '-'}</td>
      <td class="num" style="color:#56d364">${d.rec_hours.toFixed(2)}</td>
      <td class="num">${d.rec_uph}</td>
      <td class="num">${d.pct_decant}%</td>
      <td class="num">${d.pct_receive}%</td>
      <td class="bar-cell"><div class="bar-container"><div class="bar-dec" style="width:${d.pct_decant}%"></div><div class="bar-rec" style="width:${d.pct_receive}%"></div></div></td>
    </tr>
  `).join('');
  
  // Add click listeners
  document.querySelectorAll('.clickable-row').forEach(row => {
    row.addEventListener('click', () => showHistory(row.dataset.id));
  });
}

function showHistory(aaId) {
  const modal = document.getElementById('historyModal');
  const content = document.getElementById('modalContent');
  
  // Collect history for this AA across all snapshots
  const aaHistory = [];
  HISTORY.forEach(snap => {
    if (snap.data[aaId]) {
      aaHistory.push({ ...snap.data[aaId], timestamp: snap.timestamp });
    }
  });
  
  if (aaHistory.length === 0) {
    content.innerHTML = '<p style="color:#8b949e;">Aucun historique disponible pour cet associé.</p>';
    modal.classList.add('active');
    return;
  }
  
  const latest = aaHistory[aaHistory.length - 1];
  const name = latest.name || aaId;
  
  function trend(curr, prev) {
    if (prev === undefined || prev === null) return '';
    if (curr > prev) return '<span class="trend-up">▲</span>';
    if (curr < prev) return '<span class="trend-down">▼</span>';
    return '<span class="trend-stable">═</span>';
  }
  
  let tableRows = '';
  for (let i = 0; i < aaHistory.length; i++) {
    const h = aaHistory[i];
    const prev = i > 0 ? aaHistory[i-1] : null;
    tableRows += `<tr>
      <td><strong>${h.timestamp}</strong></td>
      <td class="num">${h.total_hours.toFixed(2)}</td>
      <td class="num" style="color:#58a6ff">${h.dec_hours.toFixed(2)} ${prev ? trend(h.dec_hours, prev.dec_hours) : ''}</td>
      <td class="num">${h.dec_uph} ${prev ? trend(h.dec_uph, prev.dec_uph) : ''}</td>
      <td class="num">${h.dec_cph} ${prev ? trend(h.dec_cph, prev.dec_cph) : ''}</td>
      <td class="num" style="color:#56d364">${h.rec_hours.toFixed(2)} ${prev ? trend(h.rec_hours, prev.rec_hours) : ''}</td>
      <td class="num">${h.rec_uph} ${prev ? trend(h.rec_uph, prev.rec_uph) : ''}</td>
      <td class="num">${h.pct_decant}%</td>
      <td class="num">${h.pct_receive}%</td>
    </tr>`;
  }
  
  content.innerHTML = `
    <div class="modal-title">${name}</div>
    <div class="modal-subtitle">ID: ${aaId} — ${aaHistory.length} relevé(s)</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-value" style="color:#f0f6fc">${latest.total_hours.toFixed(2)}h</div><div class="modal-stat-label">H. Totales</div></div>
      <div class="modal-stat"><div class="modal-stat-value" style="color:#58a6ff">${latest.dec_hours.toFixed(2)}h</div><div class="modal-stat-label">H. Decant</div></div>
      <div class="modal-stat"><div class="modal-stat-value" style="color:#58a6ff">${latest.dec_uph}</div><div class="modal-stat-label">UPH Dec</div></div>
      <div class="modal-stat"><div class="modal-stat-value" style="color:#58a6ff">${latest.dec_cph}</div><div class="modal-stat-label">CPH Dec</div></div>
      <div class="modal-stat"><div class="modal-stat-value" style="color:#56d364">${latest.rec_hours.toFixed(2)}h</div><div class="modal-stat-label">H. Receive</div></div>
      <div class="modal-stat"><div class="modal-stat-value" style="color:#56d364">${latest.rec_uph}</div><div class="modal-stat-label">UPH Rec</div></div>
    </div>
    <table class="modal-table">
      <thead><tr><th>Heure</th><th>H.Tot</th><th>H.Dec</th><th>UPH.D</th><th>CPH.D</th><th>H.Rec</th><th>UPH.R</th><th>%Dec</th><th>%Rec</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
  `;
  
  modal.classList.add('active');
}

// Modal close
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('historyModal').classList.remove('active');
});
document.getElementById('historyModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) document.getElementById('historyModal').classList.remove('active');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('historyModal').classList.remove('active');
});

// Event listeners
document.getElementById('search').addEventListener('input', render);
document.getElementById('filterManager').addEventListener('change', render);
document.getElementById('filterType').addEventListener('change', render);
document.getElementById('filterProcess').addEventListener('change', render);
document.getElementById('sortBy').addEventListener('change', render);

// Column header sorting
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    document.getElementById('sortBy').value = th.dataset.sort;
    
render();
  });
});


render();
</script>
</body>
</html>
