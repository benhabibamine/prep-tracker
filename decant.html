    if (proc === 'both' && (d.dec_hours === 0 || d.rec_hours === 0)) return false;
    if (proc === 'dec_only' && (d.dec_hours === 0 || d.rec_hours > 0)) return false;
    if (proc === 'rec_only' && (d.rec_hours === 0 || d.dec_hours > 0)) return false;
    return true;
  });
  
  if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
  else filtered.sort((a,b) => (b[sort]||0) - (a[sort]||0));
  
  return filtered;
}

function updateKPIs(data) {
  const totalAA = data.length;
  const totalH = data.reduce((s,d) => s + d.total_hours, 0);
  const decH = data.reduce((s,d) => s + d.dec_hours, 0);
  const recH = data.reduce((s,d) => s + d.rec_hours, 0);
  const decUnits = data.reduce((s,d) => s + d.dec_units, 0);
  const decCases = data.reduce((s,d) => s + d.dec_cases, 0);
  const recUnits = data.reduce((s,d) => s + d.rec_units, 0);
  const recCases = data.reduce((s,d) => s + d.rec_cases, 0);
  const pctDec = totalH > 0 ? (decH/totalH*100).toFixed(1) : 0;
  const pctRec = totalH > 0 ? (recH/totalH*100).toFixed(1) : 0;
  const globalDecUPH = decH > 0 ? Math.round(decUnits/decH) : 0;
  const globalDecCPH = decH > 0 ? Math.round(decCases/decH) : 0;
  const globalRecUPH = recH > 0 ? Math.round(recUnits/recH) : 0;
  const globalRecCPH = recH > 0 ? Math.round(recCases/recH) : 0;
  
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="value">${totalAA}</div><div class="label">Associés</div></div>
    <div class="kpi"><div class="value">${totalH.toFixed(1)}h</div><div class="label">Heures totales</div></div>
    <div class="kpi blue"><div class="value">${decH.toFixed(1)}h</div><div class="label">H. Decant (${pctDec}%)</div></div>
    <div class="kpi blue"><div class="value">${globalDecUPH}</div><div class="label">UPH Decant</div></div>
    <div class="kpi blue"><div class="value">${globalDecCPH}</div><div class="label">CPH Decant</div></div>
    <div class="kpi green"><div class="value">${recH.toFixed(1)}h</div><div class="label">H. Receive (${pctRec}%)</div></div>
    <div class="kpi green"><div class="value">${globalRecUPH}</div><div class="label">UPH Receive</div></div>
    <div class="kpi green"><div class="value">${globalRecCPH}</div><div class="label">CPH Receive</div></div>
  `;
}

function render() {
  const data = getFiltered();
  updateKPIs(data);
  const tbody = document.getElementById('tbody');
  
  if (data.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('noResults').style.display = 'block';
    return;
  }
  document.getElementById('noResults').style.display = 'none';
  
  tbody.innerHTML = data.map((d, i) => `
    <tr class="clickable-row" data-id="${d.id}">
      <td>${i+1}</td>
      <td><strong>${d.name}</strong><br><span style="color:#8b949e;font-size:0.7rem">${d.id}</span></td>
      <td>${d.manager}</td>
      <td><span class="type-badge ${d.type==='AMZN'?'amzn':'tpty'}">${d.type}</span></td>
      <td class="num"><strong>${d.total_hours.toFixed(2)}</strong></td>
      <td class="num" style="color:#58a6ff">${d.dec_hours > 0 ? d.dec_hours.toFixed(2) : '-'}</td>
      <td class="num">${d.dec_uph || '-'}</td>
      <td class="num">${d.dec_cph || '-'}</td>
      <td class="num" style="color:#56d364">${d.rec_hours > 0 ? d.rec_hours.toFixed(2) : '-'}</td>
      <td class="num">${d.rec_uph || '-'}</td>
      <td class="num">${d.rec_cph || '-'}</td>
      <td class="pct" style="color:#58a6ff">${d.pct_decant}%</td>
      <td class="pct" style="color:#56d364">${d.pct_receive}%</td>
      <td class="bar-cell"><div class="bar"><div class="dec" style="width:${d.pct_decant}%"></div><div class="rec" style="width:${d.pct_receive}%"></div></div></td>
    </tr>
  `).join('');
  
  // Attach click handlers
  document.querySelectorAll('.clickable-row').forEach(row => {
    row.addEventListener('click', () => openModal(row.dataset.id));
  });
}

function openModal(eid) {
  const d = DATA.find(x => x.id === eid);
  if (!d) return;
  
  document.getElementById('modalName').textContent = d.name;
  document.getElementById('modalSub').textContent = `ID: ${d.id} • Manager: ${d.manager} • Type: ${d.type}`;
  
  document.getElementById('modalStats').innerHTML = `
    <div class="modal-stat"><div class="mv" style="color:#58a6ff">${d.dec_hours.toFixed(2)}h</div><div class="ml">H. Decant</div></div>
    <div class="modal-stat"><div class="mv">${d.dec_uph}</div><div class="ml">UPH Dec</div></div>
    <div class="modal-stat"><div class="mv">${d.dec_cph}</div><div class="ml">CPH Dec</div></div>
    <div class="modal-stat"><div class="mv" style="color:#56d364">${d.rec_hours.toFixed(2)}h</div><div class="ml">H. Receive</div></div>
    <div class="modal-stat"><div class="mv">${d.rec_uph}</div><div class="ml">UPH Rec</div></div>
    <div class="modal-stat"><div class="mv">${d.rec_cph}</div><div class="ml">CPH Rec</div></div>
    <div class="modal-stat"><div class="mv">${d.total_hours.toFixed(2)}h</div><div class="ml">H. Total</div></div>
    <div class="modal-stat"><div class="mv">${d.pct_decant}%/${d.pct_receive}%</div><div class="ml">D/R</div></div>
  `;
  
  // History table
  const hBody = document.getElementById('historyBody');
  let rows = '';
  let prev = null;
  HISTORY.forEach((snap, idx) => {
    const sd = snap.data[eid];
    if (!sd) return;
    const trend = (curr, p) => {
      if (p === null || p === undefined) return '';
      if (curr > p) return '<span class="trend-up">▲</span>';
      if (curr < p) return '<span class="trend-down">▼</span>';
      return '<span class="trend-stable">═</span>';
    };
    rows += `<tr>
      <td><strong>${snap.timestamp}</strong></td>
      <td>${sd.dec_hours.toFixed(2)} ${prev ? trend(sd.dec_hours, prev.dec_hours) : ''}</td>
      <td>${sd.dec_uph} ${prev ? trend(sd.dec_uph, prev.dec_uph) : ''}</td>
      <td>${sd.dec_cph} ${prev ? trend(sd.dec_cph, prev.dec_cph) : ''}</td>
      <td>${sd.rec_hours.toFixed(2)} ${prev ? trend(sd.rec_hours, prev.rec_hours) : ''}</td>
      <td>${sd.rec_uph} ${prev ? trend(sd.rec_uph, prev.rec_uph) : ''}</td>
      <td>${sd.rec_cph} ${prev ? trend(sd.rec_cph, prev.rec_cph) : ''}</td>
      <td>${sd.total_hours.toFixed(2)} ${prev ? trend(sd.total_hours, prev.total_hours) : ''}</td>
      <td>${sd.pct_decant}%</td>
      <td>${sd.pct_receive}%</td>
    </tr>`;
    prev = sd;
  });
  
  if (!rows) rows = '<tr><td colspan="10" style="text-align:center;color:#484f58">Pas encore d\'historique pour cet AA</td></tr>';
  hBody.innerHTML = rows;
  
  document.getElementById('modalOverlay').classList.add('active');
}

// Close modal
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('active');
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('active');
});

// Event listeners
document.getElementById('search').addEventListener('input', render);
document.getElementById('filterManager').addEventListener('change', render);
document.getElementById('filterType').addEventListener('change', render);
document.getElementById('filterProcess').addEventListener('change', render);
document.getElementById('sortBy').addEventListener('change', render);

// Initial render
render();
</script>
</body>
</html>
